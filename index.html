<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ジャンル選択つき単語カード</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 40px; }
    #card { font-size: 2rem; margin: 40px 0; }
    button { font-size: 1.2rem; padding: 10px 20px; margin-top: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- ▼▼ ジャンル選択画面 ▼▼ -->
  <div id="genreScreen">
    <h2>ジャンルを選択してください（複数可）</h2>

    <label><input type="checkbox" value="fruit"> 果物</label><br>
    <label><input type="checkbox" value="animal"> 動物</label><br>
    <label><input type="checkbox" value="time"> 時間</label><br>
    <label><input type="checkbox" value="body"> 体の部位</label><br>

    <button id="startBtn">開始</button>
  </div>

  <!-- ▼▼ 単語カード画面 ▼▼ -->
  <div id="cardScreen" class="hidden">
    <div id="card">読み込み中...</div>
    <button id="actionBtn">答えを見る</button>
  </div>

  <script>
    // ▼ ジャンルごとの単語データ
    const genreData = {
      fruit: [
        { en: "apple", ja: "リンゴ" },
        { en: "banana", ja: "バナナ" },
        { en: "strawberry", ja: "イチゴ" },
        { en: "watermelon", ja: "スイカ" }
      ],
      animal: [
        { en: "bird", ja: "鳥" },
        { en: "dog", ja: "犬" },
        { en: "cat", ja: "猫" },
        { en: "pig", ja: "豚" },
        { en: "cow", ja: "牛" },
        { en: "fish", ja: "魚" }
      ],
      time: [
        { en: "morning", ja: "朝" },
        { en: "noon", ja: "昼" },
        { en: "night", ja: "夜" }
      ],
      body: [
        { en: "hand", ja: "手" },
        { en: "foot", ja: "足" },
        { en: "head", ja: "頭" },
        { en: "body", ja: "胴" }
      ]
    };

    // ▼ 選択された単語をまとめる配列
    let words = [];
    let index = 0;
    let showingAnswer = false;

    const genreScreen = document.getElementById("genreScreen");
    const cardScreen = document.getElementById("cardScreen");
    const card = document.getElementById("card");
    const btn = document.getElementById("actionBtn");

    // ▼ 開始ボタン
    document.getElementById("startBtn").addEventListener("click", () => {
      const checked = [...document.querySelectorAll("input[type=checkbox]:checked")];

      if (checked.length === 0) {
        alert("少なくとも1つ選択してください");
        return;
      }

      // 選んだジャンルの単語をすべて words に追加
      words = [];
      checked.forEach(c => {
        words = words.concat(genreData[c.value]);
      });

      // 画面切り替え
      genreScreen.classList.add("hidden");
      cardScreen.classList.remove("hidden");

      // 最初のカード表示
      index = 0;
      showWord();
    });

    // ▼ 英単語を表示
    function showWord() {
      if (index >= words.length) {
        card.textContent = "終了";
        btn.style.display = "none";
        return;
      }

      card.textContent = words[index].en;
      btn.textContent = "答えを見る";
      showingAnswer = false;
    }

    // ▼ 和訳を表示
    function showAnswer() {
      card.textContent = words[index].ja;
      btn.textContent = "次の単語カードへ";
      showingAnswer = true;
    }

    // ▼ ボタン動作
    btn.addEventListener("click", () => {
      if (!showingAnswer) {
        showAnswer();
      } else {
        index++;
        showWord();
      }
    });
  </script>

</body>
</html>
