<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語カード</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 80px; }
    #card { font-size: 2rem; margin-bottom: 40px; }
    button { font-size: 1.2rem; padding: 10px 20px; }
  </style>
</head>
<body>

  <div id="card">読み込み中...</div>
  <button id="actionBtn">答えを見る</button>

  <script>
    // 単語データ（後で JSON に分離も可能）
    const words = [
      { en: "apple", ja: "りんご" },
      { en: "bird", ja: "鳥" },
      { en: "island", ja: "島" },
      { en: "forest", ja: "森" }
    ];

    let index = 0;        // 現在の単語番号
    let showingAnswer = false; // 英単語表示中か、答え表示中か

    const card = document.getElementById("card");
    const btn = document.getElementById("actionBtn");

    // 最初のカードを表示
    showWord();

    function showWord() {
      if (index >= words.length) {
        card.textContent = "終了";
        btn.style.display = "none";
        return;
      }

      card.textContent = words[index].en;
      btn.textContent = "答えを見る";
      showingAnswer = false;
    }

    function showAnswer() {
      card.textContent = words[index].ja;
      btn.textContent = "次の単語カードへ";
      showingAnswer = true;
    }

    btn.addEventListener("click", () => {
      if (!showingAnswer) {
        // 英単語 → 和訳へ
        showAnswer();
      } else {
        // 次の単語へ
        index++;
        showWord();
      }
    });
  </script>

</body>
</html>
